<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>البيت الرقمي - صفحة العميل</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* نفس الستايلات السابقة مع تعديل طفيف */
        :root {
            --turquoise-bright: #00f2fe;
            --orange-bright: #ff7a00;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-secondary: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #004d55 0%, #111827 50%, #8f4400 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 15px;
            position: relative;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 720px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 15px;
        }
        .logo-container img {
            max-width: 100px;
            height: auto;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .brand-title {
            color: #ffffff;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .brand-title span {
            color: var(--turquoise-bright);
        }
        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 18px;
            font-weight: 500;
        }

        .client-wrapper {
            background: rgba(255, 255, 255, 0.12);
            border: 2px solid var(--turquoise-bright);
            border-radius: 20px;
            padding: 25px 18px;
            text-align: center;
            width: 100%;
        }
        .client-welcome-title {
            color: #ffffff;
            font-size: 26px;
            margin: 12px 0 4px 0;
        }
        .client-welcome-title span {
            color: var(--orange-bright);
            font-weight: bold;
        }
        .client-subtitle {
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .credentials-card {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 20px;
        }
        .credential-group {
            margin-bottom: 16px;
            text-align: right;
        }
        .credential-group:last-child { margin-bottom: 0; }
        .credential-group label {
            display: block;
            color: var(--turquoise-bright);
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .input-with-copy {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #ffffff;
        }
        .input-with-copy span {
            font-family: 'Courier New', monospace;
            font-size: 18px;
            color: #0b1519;
            font-weight: bold;
            word-break: break-all;
            text-align: center;
            direction: ltr;
            display: block;
            letter-spacing: 0.5px;
        }
        .copy-btn {
            background: linear-gradient(135deg, var(--orange-bright), #e66e00);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .copy-btn:active {
            transform: scale(0.97);
        }
        .copy-btn.copied {
            background: linear-gradient(135deg, #2ecc71, #27ae60) !important;
        }
        .client-warning {
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            background: rgba(231, 76, 60, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 10px;
            line-height: 1.5;
            text-align: right;
            margin-bottom: 12px;
        }
        
        .disclaimer-box {
            color: #fffbeb;
            font-size: 13px;
            font-weight: bold;
            background: linear-gradient(135deg, #b45309, #78350f);
            border: 1px solid var(--orange-bright);
            padding: 12px;
            border-radius: 10px;
            line-height: 1.5;
            text-align: right;
        }

        .footer-copyright {
            margin-top: 25px;
            padding-top: 16px;
            border-top: 1px solid var(--glass-border);
            text-align: center;
            color: #cbd5e1;
            font-size: 13px;
        }
        .footer-copyright strong {
            color: var(--turquoise-bright);
        }
        .footer-copyright .heart {
            color: var(--orange-bright);
            display: inline-block;
        }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .container { padding: 20px 12px; border-radius: 16px; }
            .brand-title { font-size: 22px; }
            .client-wrapper { padding: 18px 12px; border-radius: 16px; }
            .client-welcome-title { font-size: 20px; }
            .credentials-card { padding: 14px; border-radius: 12px; }
            .input-with-copy { padding: 12px; gap: 8px; border-radius: 10px; }
            .input-with-copy span { font-size: 15px; }
            .copy-btn { padding: 9px; font-size: 13px; border-radius: 8px; }
            .client-warning, .disclaimer-box { font-size: 11px; padding: 8px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="a.jpg" alt="البيت الرقمي" onerror="this.style.display='none'">
    </div>

    <div class="brand-title">🏠 <span>البيت الرقمي</span></div>
    
    <div class="client-wrapper">
        <h1 class="client-welcome-title">👋 مرحباً <span id="clientName">الزبون</span></h1>
        <p class="client-subtitle">تم تجهيز بيانات حسابك:</p>
        
        <div class="credentials-card">
            <div class="credential-group">
                <label>البريد الإلكتروني:</label>
                <div class="input-with-copy">
                    <span id="clientEmail">---</span>
                    <button class="copy-btn" onclick="copyData('clientEmail', this)">📋 نسخ</button>
                </div>
            </div>
            
            <div class="credential-group">
                <label>كلمة المرور:</label>
                <div class="input-with-copy">
                    <span id="clientPass">---</span>
                    <button class="copy-btn" onclick="copyData('clientPass', this)">📋 نسخ</button>
                </div>
            </div>
        </div>
        
        <div class="client-warning">
            🔒 تنبيه: هذه المعلومات سرية، يرجى عدم مشاركتها.
        </div>

        <div class="disclaimer-box">
            ⚠️ تنبيه هام: البيت الرقمي غير مسؤول عن ضياع الكرت أو نسيان البيانات بعد التسليم.
        </div>
        
        <div class="footer-copyright" style="border-top: none; margin-top: 20px;">
            © 2026 <strong>البيت الرقمي</strong> <span class="heart">❤️</span>
        </div>
    </div>
</div>

<script>
    // دالة نسخ البيانات
    function copyData(elementId, btnElement) {
        const textToCopy = document.getElementById(elementId).innerText;
        navigator.clipboard.writeText(textToCopy).then(() => {
            const originalHTML = btnElement.innerHTML;
            btnElement.innerHTML = '✅ تم النسخ';
            btnElement.classList.add('copied');
            setTimeout(() => {
                btnElement.innerHTML = originalHTML;
                btnElement.classList.remove('copied');
            }, 1500);
        }).catch(() => {
            alert('تعذر نسخ النص!');
        });
    }

    // استخراج البيانات من الرابط
    function loadClientData() {
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        const email = params.get('email');
        const pass = params.get('pass');

        if (email && pass) {
            document.getElementById('clientName').textContent = name ? decodeURIComponent(name) : 'عميلنا';
            document.getElementById('clientEmail').textContent = decodeURIComponent(email);
            document.getElementById('clientPass').textContent = decodeURIComponent(pass);
        } else {
            // إذا لم توجد بيانات، عرض رسالة خطأ
            document.querySelector('.client-wrapper').innerHTML = `
                <h1 class="client-welcome-title">⚠️ رابط غير صحيح</h1>
                <p class="client-subtitle">لم يتم العثور على بيانات الحساب. يرجى التواصل مع الدعم الفني.</p>
                <div class="disclaimer-box" style="margin-top:20px;">
                    يرجى التأكد من الرابط المستلم من إدارة البيت الرقمي
                </div>
            `;
        }
    }

    // منع العودة للصفحة الرئيسية
    history.pushState(null, null, location.href);
    window.onpopstate = function () { 
        history.go(1); 
    };

    // تحميل البيانات عند فتح الصفحة
    window.onload = function() {
        loadClientData();
    };
</script>

</body>
</html>
